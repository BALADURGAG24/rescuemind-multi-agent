# RescueMind AI – Google Cloud Run Deployment
# Deploy: gcloud run deploy rescuemind-ai --source .

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rescuemind-ai
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/rescuemind-ai:latest
          ports:
            - containerPort: 8501
              name: http1
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
            requests:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rescuemind-secrets
                  key: GOOGLE_API_KEY
            - name: DEMO_MODE
              value: "false"
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
